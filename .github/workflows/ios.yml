name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      scaffold: ${{ steps.filter.outputs.scaffold }}
      tdlib: ${{ steps.filter.outputs.tdlib }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scaffold:
              - 'project.ci.yml'
              - '.github/workflows/ios.yml'
            tdlib:
              - 'project.yml'
              - 'ci/**'
              - 'Anygram/**'
              - '.github/workflows/ios.yml'

  build-ipa-scaffold:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.scaffold == 'true'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
            /usr/local/Cellar/xcodegen
          key: ${{ runner.os }}-brew-xcodegen-v1
          restore-keys: |
            ${{ runner.os }}-brew-xcodegen-

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen || brew link --overwrite xcodegen
          fi
          if ! command -v xcodegen &>/dev/null; then
            brew link --overwrite xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project (CI scaffold)
        run: |
          echo "Scaffold IPA: USE_SCAFFOLD_AUTH - no real Telegram SMS."
          xcodegen generate --spec project.ci.yml

      - name: Archive
        run: |
          xcodebuild archive \
            -project Anygram.xcodeproj \
            -scheme Anygram \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Anygram.xcarchive \
            -sdk iphoneos \
            -jobs "$(sysctl -n hw.ncpu)" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA (unsigned)
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Anygram.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Package IPA fallback
        run: |
          set -e
          if [ -f "$RUNNER_TEMP/export/Anygram.ipa" ]; then
            cp "$RUNNER_TEMP/export/Anygram.ipa" "$RUNNER_TEMP/Anygram-scaffold.ipa"
          elif [ -f "$RUNNER_TEMP/Anygram.ipa" ]; then
            cp "$RUNNER_TEMP/Anygram.ipa" "$RUNNER_TEMP/Anygram-scaffold.ipa"
          else
            APP_PATH=$(find "$RUNNER_TEMP/Anygram.xcarchive/Products" -name "*.app" | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p "$RUNNER_TEMP/Payload"
              cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
              cd "$RUNNER_TEMP" && zip -r Anygram-scaffold.ipa Payload
            else
              echo "No .app found in archive"
              exit 1
            fi
          fi
          ls -la "$RUNNER_TEMP/Anygram-scaffold.ipa"

      - name: Upload scaffold IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anygram-ipa-scaffold
          path: ${{ runner.temp }}/Anygram-scaffold.ipa
          if-no-files-found: error

  build-ipa-tdlib:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.tdlib == 'true'
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ${{ runner.temp }}/DerivedData
          key: ${{ runner.os }}-tdlib-v5-${{ hashFiles('project.yml', 'ci/build-tdlib-ipa.sh') }}
          restore-keys: |
            ${{ runner.os }}-tdlib-v5-
            ${{ runner.os }}-tdlib-v4-
            ${{ runner.os }}-tdlib-

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
            /usr/local/Cellar/xcodegen
          key: ${{ runner.os }}-brew-xcodegen-v1
          restore-keys: |
            ${{ runner.os }}-brew-xcodegen-

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen || brew link --overwrite xcodegen
          fi
          if ! command -v xcodegen &>/dev/null; then
            brew link --overwrite xcodegen
          fi
          xcodegen --version

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project (TDLib)
        run: |
          echo "TDLib IPA: real Telegram auth via TDLibKit SPM (~300 MB first fetch)."
          xcodegen generate --spec project.yml

      - name: Build TDLib IPA
        run: |
          chmod +x ci/build-tdlib-ipa.sh
          ci/build-tdlib-ipa.sh

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild-build.log
          if-no-files-found: ignore

      - name: Upload TDLib IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anygram-ipa-tdlib
          path: ${{ runner.temp }}/Anygram-tdlib.ipa
          if-no-files-found: error
          retention-days: 14
